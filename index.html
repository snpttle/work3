<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중고장터 생존기: 4인의 판매자</title>
    <style>
        :root { --main: #3b82f6; --bg: #0f172a; --text: #f8fafc; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Pretendard', sans-serif; background: #000; color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #game-window { width: 380px; height: 660px; background: var(--bg); border: 2px solid #334155; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }

        /* 서사/인트로 레이어 (수험생 키우기 스타일) */
        #narrative-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 50; padding: 40px 25px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .nar-text { font-size: 16px; line-height: 1.8; color: #cbd5e1; margin-bottom: 40px; white-space: pre-wrap; animation: fadeIn 1s; }

        /* 채팅 UI */
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; animation: slideIn 0.3s ease-out; }
        .seller { background: #1e293b; color: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 2px; }
        .player { background: var(--main); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* 하단 컨트롤 패널 */
        #control-panel { background: #1e293b; padding: 20px; border-top: 1px solid #334155; min-height: 100px; }
        .opt-btn { width: 100%; padding: 14px; margin-bottom: 8px; border: 1px solid #475569; border-radius: 10px; background: #0f172a; color: white; cursor: pointer; text-align: left; font-size: 13px; transition: 0.2s; }
        .opt-btn:hover { background: var(--main); border-color: var(--main); transform: translateY(-2px); }

        /* 엔딩 레이어 */
        #ending-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 30px; box-sizing: border-box; z-index: 100; text-align: center; overflow-y: auto; }
        .rank { font-size: 50px; font-weight: 900; margin: 20px 0; letter-spacing: -2px; }
        .flag-list { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; text-align: left; font-size: 13px; margin: 15px 0; color: #fca5a5; line-height: 1.6; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="game-window">
    <div id="narrative-overlay">
        <div id="nar-content" class="nar-text"></div>
        <div id="nar-options"></div>
    </div>

    <div id="header" style="padding:15px; background:#1e293b; font-size:12px; color:#94a3b8; border-bottom:1px solid #334155;">
        <span id="target-name">연결 대기 중...</span>
    </div>
    <div id="chat-area"></div>
    <div id="control-panel">
        <div id="choice-buttons"></div>
    </div>

    <div id="ending-screen">
        <div class="rank" id="res-rank">SUCCESS</div>
        <h2 id="res-title" style="margin:5px 0;"></h2>
        <div id="res-summary" style="font-size: 14px; margin-bottom: 10px; opacity: 0.8;"></div>
        <div class="flag-list" id="res-flags"></div>
        <button class="opt-btn" onclick="location.reload()" style="text-align:center; margin-top: auto; background:white; color:black;">처음으로 돌아가기</button>
    </div>
</div>

<script>
    let redFlags = []; 
    let currentStep = 0;
    let scenario = null;

    const scenarios = {
        concert: {
            title: "🎫 콘서트 티켓",
            steps: [
                {
                    msg: "판매자: 네, 티켓 아직 있어요! 연석이라 인기가 많아서... 혹시 지금 바로 입금 가능하신가요? 지금 딴 분도 연락 와서요.",
                    options: [
                        { txt: "네! 저 진짜 가고 싶어요. 바로 보낼 테니 계좌 주세요!", flag: "상대의 조급한 압박에 휘말려 검증 절차를 생략했습니다.", next: 1 },
                        { txt: "입금 전에 티켓 사진에 제 이름 써서 인증 부탁드려도 될까요?", next: 1 }
                    ]
                },
                {
                    msg: "판매자: 아, 제가 지금 밖이라... 대신 제가 수수료 부담하는 공식 안전결제 링크 보내드릴게요. 괜찮죠?",
                    options: [
                        { txt: "수수료까지 내주신다니 좋네요! 링크 보내주세요.", flag: "공식 앱이 아닌 외부 링크 결제 제안을 수락했습니다.", next: 2 },
                        { txt: "링크는 불안해서요. 공식 앱 결제창으로 직접 띄워주세요.", next: 2 }
                    ]
                },
                {
                    msg: "판매자: 링크 보내드렸어요! [naver-pay.safe-center.xyz] 여기서 결제하시면 돼요. 5분 내로 안 하시면 다음 분께 넘길게요!",
                    options: [
                        { txt: "알겠습니다. 지금 바로 결제할게요!", action: "FAIL", flag: "가짜 URL(.xyz)을 확인하지 않고 피싱 페이지에 진입했습니다." },
                        { txt: "주소가 이상해요. 거래 취소하겠습니다.", action: "SUCCESS" }
                    ]
                }
            ]
        },
        tablet: {
            title: "💻 태블릿 PC",
            steps: [
                {
                    msg: "판매자: 이거 사실 제가 대학 등록금 보태려고 파는 거라... 혹시 학생이시면 제가 택배비는 빼드릴게요.",
                    options: [
                        { txt: "우와, 감사합니다! 공부 열심히 하시는 분 같아서 믿음이 가네요.", flag: "상대의 감정적인 서사에 휘말려 경계심을 낮췄습니다.", next: 1 },
                        { txt: "등록금이라니 힘드시겠어요. 그런데 혹시 직거래는 안 될까요?", next: 1 }
                    ]
                },
                {
                    msg: "판매자: 제가 지방이라 직거래는 힘들고... 사기 걱정되시면 제가 안전결제 사이트 링크 하나 만들어 드릴까요?",
                    options: [
                        { txt: "네, 안전결제라면 안심이죠! 링크 주세요.", flag: "판매자가 직접 전달하는 링크는 안전결제가 아니라는 사실을 간과했습니다.", next: 2 },
                        { txt: "제가 사용하는 플랫폼의 공식 결제 시스템을 이용하고 싶어요.", next: 2 }
                    ]
                },
                {
                    msg: "판매자: 여기요! [n-pay-security.net/item/102] 로그인 하시면 결제창 뜹니다.",
                    options: [
                        { txt: "로그인 후 결제를 진행한다.", action: "FAIL", flag: "아이디와 비밀번호를 낚아채는 피싱 사이트의 함정에 빠졌습니다." },
                        { txt: "도메인 주소가 공식 사이트와 다릅니다. 차단할게요.", action: "SUCCESS" }
                    ]
                }
            ]
        },
        shoes: {
            title: "👟 한정판 운동화",
            steps: [
                {
                    msg: "판매자: 쿨거래 시 택포해 드립니다. 대신 제 계좌 말고 제 와이프 계좌로 입금해 주셔야 하는데 괜찮나요? 제 계좌가 한도 초과라서요.",
                    options: [
                        { txt: "네, 가족 계좌면 상관없죠. 계좌번호 주세요.", flag: "예금주 이름이 다른 계좌는 '삼자 사기'의 전형적인 수법입니다.", next: 1 },
                        { txt: "죄송하지만 본인 명의 계좌가 아니면 거래하기 힘들 것 같아요.", next: 1 }
                    ]
                },
                {
                    msg: "판매자: 아, 그럼 제가 신분증이랑 계좌 같이 찍어서 보내드릴게요. 이 정도면 믿으시겠죠? (사진 전송)",
                    options: [
                        { txt: "확인했습니다! 입금할게요.", action: "FAIL", flag: "도용된 타인의 신분증 사진에 속아 삼자 사기범에게 송금했습니다." },
                        { txt: "신분증 사진만으로는 부족합니다. 더치트 조회를 해볼게요.", action: "SUCCESS" }
                    ]
                }
            ]
        },
        console: {
            title: "🎮 휴대용 게임기",
            steps: [
                {
                    msg: "판매자: 저희 애가 이제 공부해야 해서 급하게 내놔요. 애기 키우는 집이라 담배 안 피우고 정말 깨끗하게 썼어요.",
                    options: [
                        { txt: "믿음이 가네요! 혹시 오늘 바로 발송 가능하신가요?", flag: "판매자의 사회적 지위(부모)를 맹신하여 물건 검증을 소홀히 했습니다.", next: 1 },
                        { txt: "아이와 함께 있는 사진이나 오늘 날짜가 적힌 메모 인증 가능할까요?", next: 1 }
                    ]
                },
                {
                    msg: "판매자: 아유, 그럼요! (사진 전송) 근데 저희 애가 어려서 나가기가 힘든데... 택배로만 해도 괜찮으시죠? 덤으로 게임 팩도 하나 드릴게요.",
                    options: [
                        { txt: "네, 덤까지 주신다니 감사합니다! 택배로 보내주세요.", action: "FAIL", flag: "과한 친절과 '덤'으로 의심을 무장해제시킨 뒤 벽돌을 보내는 수법에 당했습니다." },
                        { txt: "집 근처까지 제가 갈게요. 문고리 거래라도 안 될까요?", action: "SUCCESS" }
                    ]
                }
            ]
        }
    };

    function init() {
        const introText = "기말고사가 끝나고 한 달간 알바해서 모은 돈.\n그토록 갖고 싶던 물건을 중고로 사보려 한다.\n\n중고 장터 어플을 켜고 키워드를 검색했다.";
        document.getElementById('nar-content').innerText = introText;
        document.getElementById('nar-options').innerHTML = `<button class="opt-btn" onclick="showItemSelect()">중고 매물 찾아보기...</button>`;
    }

    function showItemSelect() {
        document.getElementById('nar-content').innerText = "어떤 물건을 검색해볼까?\n(잘못된 판단은 한 달간의 노력을 물거품으로 만든다.)";
        document.getElementById('nar-options').innerHTML = `
            <button class="opt-btn" onclick="startGame('concert')">🎫 콘서트 티켓</button>
            <button class="opt-btn" onclick="startGame('tablet')">💻 태블릿 PC</button>
            <button class="opt-btn" onclick="startGame('shoes')">👟 한정판 운동화</button>
            <button class="opt-btn" onclick="startGame('console')">🎮 휴대용 게임기</button>
        `;
    }

    function startGame(id) {
        scenario = scenarios[id];
        document.getElementById('target-name').innerText = `접속 중: ${scenario.title} 판매자`;
        document.getElementById('narrative-overlay').style.transform = "translateY(-100%)";
        addChat('player', `${scenario.title} 아직 판매 중인가요?`);
        setTimeout(renderStep, 800);
    }

    function renderStep() {
        const step = scenario.steps[currentStep];
        addChat('seller', step.msg);
        
        const btnArea = document.getElementById('choice-buttons');
        btnArea.innerHTML = '';
        
        step.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.txt;
            btn.onclick = () => {
                addChat('player', opt.txt);
                if(opt.flag) redFlags.push(opt.flag);
                
                if(opt.action) {
                    setTimeout(() => finishGame(opt.action), 800);
                } else {
                    currentStep = opt.next;
                    setTimeout(renderStep, 800);
                }
            };
            btnArea.appendChild(btn);
        });
    }

    function addChat(role, text) {
        const area = document.getElementById('chat-area');
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    function finishGame(result) {
        const screen = document.getElementById('ending-screen');
        screen.style.display = 'flex';
        
        const rank = document.getElementById('res-rank');
        const title = document.getElementById('res-title');
        const summary = document.getElementById('res-summary');
        const flagBox = document.getElementById('res-flags');

        if(result === 'SUCCESS') {
            screen.style.background = "#064e3b";
            rank.innerText = redFlags.length === 0 ? "PERFECT" : "LUCKY";
            title.innerText = "안전하게 물건을 구했습니다!";
            summary.innerText = "당신은 사기꾼의 유혹을 뿌리치고\n소중한 자산을 지켜냈습니다.";
        } else {
            screen.style.background = "#7f1d1d";
            rank.innerText = "FAIL";
            title.innerText = "사기 피해가 발생했습니다.";
            summary.innerText = "상대방은 입금 확인 직후 당신을 차단했고,\n더 이상 연락이 닿지 않습니다.";
        }

        if(redFlags.length > 0) {
            flagBox.innerHTML = "<strong>⚠️ 당신이 놓친 위험 신호들:</strong><br><br>" + 
                                redFlags.map(f => "• " + f).join('<br>');
        } else {
            flagBox.innerHTML = "<strong>✅ 완벽한 방어!</strong><br>모든 사기 징후를 정확하게 파악하고 대응했습니다.";
        }
    }

    init();
</script>
</body>
</html>
